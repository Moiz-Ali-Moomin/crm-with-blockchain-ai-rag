worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;
    ssl_session_tickets  off;   # key is never rotated — disabling preserves forward secrecy
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    # ssl_stapling requires the cert chain to include an OCSP responder URL.
    # Let's Encrypt certs include one, but the staple is not available during
    # nginx -t (config test) — only after the first real request populates it.
    # The warning is harmless; keep stapling enabled for production HTTPS perf.
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Logging ───────────────────────────────────────────────────────────────
    # JSON access log — parsed by Promtail, ingested into Loki
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"status":$status,'
          '"body_bytes":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_time":"$upstream_response_time",'
          '"upstream_addr":"$upstream_addr",'
          '"http_referrer":"$http_referer",'
          '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Keyed by real client IP (after X-Forwarded-For is trusted from nginx itself).
    # auth_limit: tight limit for login/register to slow credential stuffing.
    # api_limit: general API limit — generous enough for normal use.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:20m   rate=60r/s;
    limit_req_status 429;

    # ── Nginx stub_status (for prometheus exporter) ───────────────────────────
    server {
        listen 8080;
        server_name _;
        access_log off;

        location /stub_status {
            stub_status;
            allow 172.0.0.0/8;   # Docker network range
            deny all;
        }
    }

    # ── Include site config (generated by deploy script) ─────────────────────
    include /etc/nginx/conf.d/app.conf;
}
