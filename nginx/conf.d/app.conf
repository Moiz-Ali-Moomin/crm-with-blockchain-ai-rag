# ─────────────────────────────────────────────────────────────────────────────
# app.conf — bootstrap HTTP-only config
#
# PURPOSE: This file is the initial state checked into git. It serves two roles:
#
#   1. Bootstrap (first server provisioning):
#      Nginx starts on HTTP only so certbot can complete the ACME challenge via
#      /.well-known/acme-challenge/. No SSL directives means no cert dependency.
#
#   2. Post-deploy runtime:
#      The deploy script (cd.yml step [5/7]) overwrites this file with the
#      rendered output of single-slot.conf.template or canary.conf.template,
#      which include full SSL config. Nginx is then reloaded in-place (SIGHUP).
#
# IMPORTANT: Do not add ssl_certificate directives here. If certs do not exist
# on the host, nginx -t will fail and block the entire deployment pipeline.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name bestpurchasestore.com www.bestpurchasestore.com;

    # ACME challenge endpoint — must work before certs exist
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Internal health probe — used by Docker healthcheck and deploy pipeline
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 200 "Service starting — SSL bootstrap in progress\n";
        add_header Content-Type text/plain;
    }
}
