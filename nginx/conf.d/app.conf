# ─────────────────────────────────────────────────────────────
# Production Nginx Config (HTTP → HTTPS + SSL + Blue/Green)
# ─────────────────────────────────────────────────────────────

# ── HTTP: Redirect everything to HTTPS ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bestpurchasestore.com www.bestpurchasestore.com;

    # ACME challenge (for certbot renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect all traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Main app (Blue slot) ──────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bestpurchasestore.com www.bestpurchasestore.com;

    # SSL Certificates (Certbot)
    ssl_certificate /etc/letsencrypt/live/bestpurchasestore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bestpurchasestore.com/privkey.pem;

    # SSL Settings (secure defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Frontend (Next.js / React) ──
    location / {
        proxy_pass http://crm_web_blue:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API ──
    location /api/ {
        proxy_pass http://crm_api_blue:3001/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}