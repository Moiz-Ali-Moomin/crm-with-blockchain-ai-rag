server {
    listen 443 ssl;
    server_name bestpurchasestore.com www.bestpurchasestore.com;

    ssl_certificate /etc/letsencrypt/live/bestpurchasestore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bestpurchasestore.com/privkey.pem;

    # 🔐 security
    location ~ /\.(env|git) {
        deny all;
        return 403;
    }

    # frontend
    location / {
        proxy_pass http://crm_web_green:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # api
    location /api/ {
        proxy_pass http://crm_api_green:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Requested-With  $http_x_requested_with;
        # LLM agent loops (up to 3 iterations) can take 90–120 s
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout  10s;
    }
}
