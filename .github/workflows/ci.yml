name: CI

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

env:
  NODE_VERSION: '20'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  REGISTRY: ghcr.io

defaults:
  run:
    shell: bash

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Quality gates (run in parallel)
  # ────────────────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend — lint / typecheck / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  backend-tests:
    name: Backend — unit / integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:cov -- --passWithNoTests --runInBand
        env:
          NODE_ENV: test

      # Upload coverage so it can be linked from PRs / Grafana
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: crm-backend/coverage/

  frontend-quality:
    name: Frontend — lint / typecheck / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-frontend
    env:
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  # ────────────────────────────────────────────────────────────────────────────
  # Docker build validation (all branches / PRs)
  #
  # WHY separate from push: secrets are only available on main. On PRs/branches
  # we use a placeholder URL so the Dockerfile's fail-fast guard passes, but we
  # never push the image — it's purely a build-succeeds check.
  # ────────────────────────────────────────────────────────────────────────────
  nginx-validate:
    name: Nginx config consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every limit_req zone reference is defined in nginx.conf
        run: |
          set -euo pipefail

          # Extract all zone names referenced in templates (limit_req zone=NAME)
          REFERENCED=$(grep -hoPR '(?<=limit_req zone=)\S+(?=\s)' nginx/conf.d/*.template \
            | sed 's/;//g' | sort -u)

          # Extract all zone names defined in nginx.conf (limit_req_zone ... zone=NAME:SIZE)
          DEFINED=$(grep -hoP '(?<=zone=)\S+(?=:)' nginx/nginx.conf | sort -u)

          MISSING=""
          for zone in $REFERENCED; do
            if ! echo "$DEFINED" | grep -qx "$zone"; then
              MISSING="$MISSING $zone"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "ERROR: These limit_req zones are referenced in templates but not defined in nginx.conf:"
            for z in $MISSING; do echo "  - $z"; done
            echo ""
            echo "Add limit_req_zone directives to nginx/nginx.conf in the same commit as the template changes."
            exit 1
          fi

          echo "OK: all referenced zones are defined in nginx.conf"
          echo "  Defined: $(echo $DEFINED | tr ' ' ', ')"
          echo "  Referenced: $(echo $REFERENCED | tr ' ' ', ')"

      - name: nginx -t syntax check against rendered single-slot config
        run: |
          set -euo pipefail

          # Render the template with a dummy slot value
          ACTIVE_SLOT=blue \
          envsubst '${ACTIVE_SLOT}' \
            < nginx/conf.d/single-slot.conf.template \
            > /tmp/app.conf

          # Generate a self-signed cert on the runner — openssl is available on
          # ubuntu-latest but NOT inside nginx:1.27-alpine (minimal image, no CLI tools).
          # We mount the certs as a volume so nginx can satisfy ssl_certificate.
          mkdir -p /tmp/fake-certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /tmp/fake-certs/privkey.pem \
            -out    /tmp/fake-certs/fullchain.pem \
            -subj   '/CN=ci-test' 2>/dev/null

          # Run nginx -t inside the exact production image with all three bind mounts.
          # --entrypoint nginx overrides the default docker-entrypoint.sh so only
          # `nginx -t` runs — no daemon startup, no port binding needed.
          #
          # --add-host: nginx resolves upstream server hostnames at config-test time.
          # crm_api_blue/green and crm_web_blue/green only exist inside the Docker
          # network; outside it they're NXDOMAIN and nginx -t fails with "host not
          # found in upstream". Mapping them to 127.0.0.1 satisfies the resolver
          # without starting any real backend — nginx -t only checks config validity,
          # it never actually connects to upstreams.
          docker run --rm \
            --entrypoint nginx \
            --add-host crm_api_blue:127.0.0.1 \
            --add-host crm_api_green:127.0.0.1 \
            --add-host crm_web_blue:127.0.0.1 \
            --add-host crm_web_green:127.0.0.1 \
            -v "$(pwd)/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "/tmp/app.conf:/etc/nginx/conf.d/app.conf:ro" \
            -v "/tmp/fake-certs:/etc/letsencrypt/live/bestpurchasestore.com:ro" \
            nginx:1.27-alpine \
            -t

  docker-validate:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-tests
      - frontend-quality
    # Skip on main — the push job below covers it
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Validate — API
        uses: docker/build-push-action@v5
        with:
          context: ./crm-backend
          push: false
          tags: crm-api:ci
          cache-from: type=gha,scope=api

      - name: Validate — Web
        uses: docker/build-push-action@v5
        with:
          context: ./crm-frontend
          push: false
          tags: crm-web:ci
          # Use a real-looking placeholder so the Dockerfile fail-fast passes
          build-args: |
            NEXT_PUBLIC_API_URL=https://placeholder.local
            NEXT_PUBLIC_APP_URL=https://placeholder.local
          cache-from: type=gha,scope=web

  # ────────────────────────────────────────────────────────────────────────────
  # Build immutable, versioned Docker images and push to GHCR (main only)
  #
  # WHY: Building on the server is dangerous — if the build fails mid-way the
  # server is left in a broken state. CI builds are hermetic, cached, and the
  # resulting image is the exact artifact that gets deployed. The SHA tag makes
  # every build uniquely addressable so rollback = pull a previous tag.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push images → GHCR
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-tests
      - frontend-quality
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      api_image: ${{ steps.image-names.outputs.image_api }}
      web_image: ${{ steps.image-names.outputs.image_web }}

    steps:
      - uses: actions/checkout@v4

      # ── Compute lowercase image names ──────────────────────────────────────
      # WHY: github.repository_owner preserves original casing; Docker requires
      # lowercase image names. Compute once here and reference via step outputs.
      - name: Compute image names
        id: image-names
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_api=ghcr.io/${OWNER_LC}/crm-api" >> "$GITHUB_OUTPUT"
          echo "image_web=ghcr.io/${OWNER_LC}/crm-web" >> "$GITHUB_OUTPUT"

      # ── Registry auth ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build metadata (tags + labels) ────────────────────────────────────
      # Tags produced:
      #   ghcr.io/owner/crm-api:sha-abc1234   ← immutable, used for deploy
      #   ghcr.io/owner/crm-api:main           ← "latest on main" pointer
      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.image_api }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Docker metadata — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.image_web }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      # Expose the sha tag so CD can reference the exact image
      - name: Export image tag
        id: meta
        run: echo "version=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Buildx (multi-platform, layer cache) ──────────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Build API ─────────────────────────────────────────────────────────
      - name: Build & push — API
        uses: docker/build-push-action@v5
        with:
          context: ./crm-backend
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Build Web ─────────────────────────────────────────────────────────
      # WHY: NEXT_PUBLIC_* vars are baked into the Next.js bundle at build time.
      # They must come from secrets here — never from a .env file on the server.
      - name: Build & push — Web
        uses: docker/build-push-action@v5
        with:
          context: ./crm-frontend
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      # ── Runtime smoke test ────────────────────────────────────────────────
      # WHY a real Postgres, not a dummy URL:
      #   PrismaService.onModuleInit() calls $connect() — this runs at NestJS
      #   bootstrap, before any request is served. A bad DATABASE_URL makes the
      #   process exit before it can bind port 3001, so /health/live is never
      #   reachable regardless of how long we wait.
      #
      # WHY pgvector/pgvector:pg16, not postgres:16:
      #   The schema declares `extensions = [pgvector(map: "vector")]`.
      #   prisma migrate deploy will execute CREATE EXTENSION vector, which
      #   requires the pgvector shared library. Plain postgres:16 does not ship it.
      #
      # WHY a named Docker network (not --network host or GitHub services):
      #   The API runs inside a Docker container. From inside that container,
      #   "localhost" means the container itself — not the host or any sibling.
      #   GitHub Actions `services:` sidecars are reachable from the runner host
      #   at localhost:<mapped-port>, but NOT from inside another container.
      #   A shared named network lets containers resolve each other by --name.
      - name: Runtime smoke test — API
        env:
          IMAGE_API: ${{ steps.image-names.outputs.image_api }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          # ── [1] Create an isolated bridge network for this smoke test ─────────
          # All containers join it; they resolve each other by container --name.
          docker network create smoke_net

          # ── [2] Start Postgres (pgvector build — required by schema extension) ─
          # WHY pgvector image: schema.prisma declares `extensions = [pgvector]`.
          # prisma migrate deploy runs CREATE EXTENSION vector at migration time;
          # plain postgres:16 does not ship the .so and the migration fails.
          docker run -d \
            --name smoke_postgres \
            --network smoke_net \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            pgvector/pgvector:pg16

          # ── [3] Start Redis ───────────────────────────────────────────────────────
          # WHY: RedisService connects at bootstrap (BullMQ queues, JWT blacklist,
          # response caching all use Redis). Without a real Redis on the network,
          # ioredis throws on connect() and NestJS re-throws it, killing the process
          # before /health/live can bind — same failure mode as missing Postgres.
          # redis:7-alpine is tiny (~30MB) and starts in <1s — no readiness wait needed.
          docker run -d \
            --name smoke_redis \
            --network smoke_net \
            redis:7-alpine

          # ── [4] Wait for Postgres to accept connections ────────────────────────
          # pg_isready probes the TCP port; we run it inside the same container
          # to avoid needing a host-side psql install.
          echo "Waiting for Postgres to be ready..."
          for i in $(seq 1 20); do
            if docker exec smoke_postgres pg_isready -U test -d test -q 2>/dev/null; then
              echo "  OK: Postgres ready (attempt $i/20)"
              break
            fi
            if [ "$i" = "20" ]; then
              echo "  FAIL: Postgres did not become ready in time"
              docker logs smoke_postgres --tail 30
              exit 1
            fi
            echo "  attempt $i/20 — not ready yet, retrying in 3s..."
            sleep 3
          done

          # ── [4] Run Prisma migrations against the test DB ─────────────────────
          # WHY: $connect() alone does not fail on a missing schema — it's the
          # first real query that hits a missing table. Running migrate deploy
          # ensures the schema is applied so /health/ready also passes, and
          # confirms migrations themselves are not broken.
          # We run this from the image itself so the migration files are exactly
          # what was built into the artifact — no host-side node_modules needed.
          echo "Running Prisma migrations..."
          docker run --rm \
            --network smoke_net \
            -e DATABASE_URL="postgresql://test:test@smoke_postgres:5432/test" \
            --entrypoint npx \
            "${IMAGE_API}:${IMAGE_TAG}" \
            prisma migrate deploy

          # ── [5] Start the API container ───────────────────────────────────────
          # Env var audit against env.validation.ts (Zod schema):
          #
          #   REQUIRED (no default, crashes if absent):
          #     DATABASE_URL       — z.string().url()          → real postgres on smoke_net
          #     JWT_SECRET         — z.string().min(32)        → 42-char CI value
          #     JWT_REFRESH_SECRET — z.string().min(32)        → 38-char CI value
          #
          #   OPTIONAL with defaults (won't crash if absent):
          #     NODE_ENV           — defaults to 'development'
          #     PORT               — defaults to '3001'
          #
          #   REQUIRED in practice (BullMQ + JWT blacklist):
          #     REDIS_URL          — points to smoke_redis container on smoke_net.
          #                          localhost:6379 is wrong inside a container (loopback).
          #
          #   OPTIONAL, no default (z.optional() — safe to omit):
          #     MONGO_URI          — MongoModule falls back to sentinel URI when absent
          #                          after the mongo.module.ts fix. No crash, just a warn.
          #     ANTHROPIC_API_KEY  — RagService defers guard to query() call time.
          #     SENDGRID_*, TWILIO_*, STRIPE_*, BLOCKCHAIN_* — all z.optional().
          #
          #   REQUIRED at bootstrap (getOrThrow — no default):
          #     USDC_CONTRACT_ADDRESS — UsdcContractService injects this in its constructor.
          #     RPC_URL               — EthereumProviderService.initHttpProvider() reads this.
          #                             Public Polygon Amoy endpoint — no API key needed.
          #                             ethers JsonRpcProvider is lazy; no connection is made
          #                             during bootstrap, only when a method is first called.
          docker run -d \
            --name smoke_api \
            --network smoke_net \
            -e NODE_ENV=production \
            -e PORT=3001 \
            -e DATABASE_URL="postgresql://test:test@smoke_postgres:5432/test" \
            -e REDIS_URL="redis://smoke_redis:6379" \
            -e JWT_SECRET="ci-smoke-test-not-for-prod-pad-to-32-chars!!" \
            -e JWT_REFRESH_SECRET="ci-smoke-refresh-not-for-prod-pad-32chars" \
            -e USDC_CONTRACT_ADDRESS="0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582" \
            -e RPC_URL="https://rpc-amoy.polygon.technology" \
            -e RAZORPAY_KEY_ID="rzp_test_ci_placeholder" \
            -e RAZORPAY_KEY_SECRET="ci_placeholder_secret_not_for_prod" \
            -e RAZORPAY_WEBHOOK_SECRET="ci_placeholder_webhook_secret" \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -p 3001:3001 \
            "${IMAGE_API}:${IMAGE_TAG}"

          # ── [6] Poll /health/live via the host-mapped port ────────────────────
          # WHY /health/live not /health/ready:
          #   /live returns {status:"ok"} with zero external dependencies.
          #   /ready runs a Prisma ping — valid to test here since migrations ran,
          #   but /live failing means the process itself didn't boot. Gate on /live
          #   first; /ready is verified separately in the post-cutover prod check.
          # WHY curl from the host (not docker exec):
          #   Container port 3001 is mapped to host 3001 via -p. curl from the
          #   runner host exercises the full network stack (port binding, listen
          #   backlog) — a more realistic signal than exec-inside-container wget.
          echo "Polling /api/v1/health/live (max 90s)..."
          for i in $(seq 1 18); do
            HTTP_STATUS=$(curl -sf --max-time 5 \
              -o /dev/null -w "%{http_code}" \
              http://localhost:3001/api/v1/health/live 2>/dev/null || echo "000")

            echo "  attempt $i/18 — HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "  PASS: /health/live returned 200"

              # ── Also verify /health/ready (DB connectivity) ──────────────────
              READY_STATUS=$(curl -sf --max-time 10 \
                -o /dev/null -w "%{http_code}" \
                http://localhost:3001/api/v1/health/ready 2>/dev/null || echo "000")
              echo "  /health/ready → HTTP $READY_STATUS"
              if [ "$READY_STATUS" != "200" ]; then
                echo "  WARN: /health/ready did not return 200 — dumping logs"
                docker logs smoke_api --tail 30
              fi

              docker rm -f smoke_api smoke_postgres smoke_redis
              docker network rm smoke_net
              exit 0
            fi

            sleep 5
          done

          echo "  FAIL: /health/live did not return 200 within 90s"
          echo "--- API logs ---"
          docker logs smoke_api --tail 60
          echo "--- Postgres logs ---"
          docker logs smoke_postgres --tail 20
          docker rm -f smoke_api smoke_postgres smoke_redis || true
          docker network rm smoke_net || true
          exit 1
