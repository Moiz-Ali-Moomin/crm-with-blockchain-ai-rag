name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH || secrets.PRODUCTION_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      API_HEALTH_URL: ${{ vars.PRODUCTION_API_HEALTH_URL || secrets.PRODUCTION_API_HEALTH_URL }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    environment:
      name: production
      url: ${{ vars.PRODUCTION_APP_URL }}
    steps:
      - name: Resolve deployment metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy configuration
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || { echo "::error::Missing secret DEPLOY_HOST"; exit 1; }
          test -n "${{ secrets.DEPLOY_USER }}" || { echo "::error::Missing secret DEPLOY_USER"; exit 1; }
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || { echo "::error::Missing secret DEPLOY_SSH_KEY"; exit 1; }
          test -n "${DEPLOY_PATH}" || { echo "::error::Missing deploy path. Set vars.PRODUCTION_DEPLOY_PATH or secrets.DEPLOY_PATH"; exit 1; }
          test -n "${API_HEALTH_URL}" || { echo "::error::Missing vars.PRODUCTION_API_HEALTH_URL"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ steps.meta.outputs.sha }}
          DEPLOY_BRANCH: ${{ steps.meta.outputs.branch }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          API_HEALTH_URL: ${{ env.API_HEALTH_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_SHA,DEPLOY_BRANCH,DEPLOY_PATH,API_HEALTH_URL
          script: |
            set -Eeuo pipefail

            on_error() {
              echo "[ERROR] Deployment failed on line $1"
              if [ -f "${DEPLOY_PATH}/docker-compose.prod.yml" ]; then
                docker compose -f "${DEPLOY_PATH}/docker-compose.prod.yml" ps || true
                docker compose -f "${DEPLOY_PATH}/docker-compose.prod.yml" logs --tail=100 api web nginx || true
              fi
            }

            trap 'on_error $LINENO' ERR

            : "${DEPLOY_SHA:?DEPLOY_SHA is required}"
            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
            : "${API_HEALTH_URL:?API_HEALTH_URL is required}"

            COMPOSE_FILE="${DEPLOY_PATH}/docker-compose.prod.yml"

            echo "[INFO] Starting deploy for ${DEPLOY_BRANCH} @ ${DEPLOY_SHA}"
            cd "${DEPLOY_PATH}"

            if [ ! -d .git ]; then
              echo "[ERROR] ${DEPLOY_PATH} is not a git repository"
              exit 1
            fi

            git fetch --prune origin
            git checkout --force "${DEPLOY_SHA}"

            echo "[INFO] Building and starting containers"
            docker compose -f "${COMPOSE_FILE}" build --pull api web
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans postgres redis mongodb api web nginx

            echo "[INFO] Waiting for API health check"
            for attempt in $(seq 1 24); do
              if curl --fail --silent --show-error "${API_HEALTH_URL}" > /dev/null; then
                echo "[INFO] API is healthy"
                break
              fi

              if [ "${attempt}" -eq 24 ]; then
                echo "[ERROR] API health check did not pass in time"
                exit 1
              fi

              sleep 5
            done

            echo "[INFO] Deployment complete"
            docker compose -f "${COMPOSE_FILE}" ps
