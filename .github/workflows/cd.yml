name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false   # Never cancel a running deploy

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://37.27.41.226:3000

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/nexus-crm

            echo "==> Pulling latest code..."
            git pull origin main

            # ── Backend ────────────────────────────────────────────────────────
            echo "==> Building backend..."
            cd /opt/nexus-crm/crm-backend
            npm ci --prefer-offline
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            echo "==> Restarting backend..."
            kill $(fuser 3001/tcp 2>/dev/null) || true
            sleep 1
            nohup node dist/src/main.js > /tmp/crm-api.log 2>&1 &
            echo "Backend PID: $!"

            # Wait for backend to be ready
            echo "==> Waiting for backend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "Backend is up."
                break
              fi
              sleep 2
            done

            # ── Frontend ───────────────────────────────────────────────────────
            echo "==> Building frontend..."
            cd /opt/nexus-crm/crm-frontend
            npm install --legacy-peer-deps --prefer-offline
            npm run build

            echo "==> Restarting frontend..."
            kill $(fuser 3000/tcp 2>/dev/null) || true
            sleep 1
            nohup npm start > /tmp/crm-web.log 2>&1 &
            echo "Frontend PID: $!"

            echo "==> Deploy complete!"
