name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234). Leave blank to use CI artifact.'
        required: false
        default: ''
      canary_weight:
        description: 'Canary traffic weight (0-100). 0 = full blue-green, no canary.'
        required: false
        default: '0'

concurrency:
  group: cd-production
  cancel-in-progress: false   # never cancel a running deploy — finish or rollback

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Blue-Green Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      # ── Resolve image names + tag ─────────────────────────────────────────
      # WHY: The tag MUST come from the CI artifact (head_sha from workflow_run)
      # to guarantee we deploy the exact image CI built and validated.
      # Recomputing sha from git is unsafe — the branch may have advanced.
      # Manual dispatch allows an explicit override for hotfixes/rollbacks.
      - name: Resolve image tag
        id: resolve
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_api=ghcr.io/${OWNER_LC}/crm-api" >> "$GITHUB_OUTPUT"
          echo "image_web=ghcr.io/${OWNER_LC}/crm-web" >> "$GITHUB_OUTPUT"

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            # Manual dispatch with explicit tag — e.g. hotfix or rollback to a prior sha
            TAG="${{ github.event.inputs.image_tag }}"
            echo "  Source: manual override"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Strict CI contract: use the SHA that CI actually built, not a recomputed value
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA:0:7}"
            echo "  Source: CI workflow_run head_sha=${SHA}"
          else
            echo "ERROR: Cannot determine image tag — no input and no workflow_run context" && exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "canary_weight=${{ github.event.inputs.canary_weight || '0' }}" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy tag: $TAG"

      # ── SSH: Blue-Green Deploy ────────────────────────────────────────────
      - name: Deploy to server (blue-green)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          IMAGE_API: ${{ steps.resolve.outputs.image_api }}
          IMAGE_WEB: ${{ steps.resolve.outputs.image_web }}
          CANARY_WEIGHT: ${{ steps.resolve.outputs.canary_weight }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GIT_REPO: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: IMAGE_TAG,IMAGE_API,IMAGE_WEB,CANARY_WEIGHT,GHCR_TOKEN,GHCR_USER,GIT_REPO,DEPLOY_PATH
          # Timeout generous — health checks can take up to 3 min
          command_timeout: 18m
          script: |
            set -euo pipefail

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " CRM Blue-Green Deploy — tag: $IMAGE_TAG"
            echo " Canary weight: $CANARY_WEIGHT%"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            DEPLOY_PATH="${DEPLOY_PATH:-/opt/crm-with-blockchain-rag}"
            cd "$DEPLOY_PATH"

            # ── [0] Pull deploy helpers ──────────────────────────────────────
            git remote set-url origin "https://github.com/${GIT_REPO}.git"
            git fetch origin main --quiet
            git checkout origin/main -- deploy/ nginx/ observability/ docker-compose.yml docker-compose.blue.yml docker-compose.green.yml

            # ── [0b] Ensure nginx container has current bind mounts ──────────
            # WHY: if crm_nginx was ever started without docker compose (e.g.
            # manually, or before bind mounts were added to docker-compose.yml),
            # it runs with the image's built-in nginx.conf — which has no
            # limit_req_zone definitions. nginx -t then fails with "zero size
            # shared memory zone" even though the file on disk is correct.
            # `docker compose up -d nginx` is idempotent: no-op when the running
            # container already matches the compose spec; recreates (<1s) only
            # when it doesn't. A brief nginx restart here is safe — it happens
            # before any slot is started and before any traffic switch.
            echo "Ensuring crm_nginx has current bind mounts..."
            if ! docker exec crm_nginx grep -q "limit_req_zone" /etc/nginx/nginx.conf 2>/dev/null; then
              echo "  crm_nginx is using image default config (no limit_req_zone) — recreating container"
              docker compose -f "$DEPLOY_PATH/docker-compose.yml" up -d --force-recreate nginx
              sleep 3
              echo "  OK: crm_nginx recreated with bind-mounted config"
            else
              echo "  OK: crm_nginx bind mounts verified"
            fi

            # ── [1] Authenticate to GHCR ────────────────────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── [2] Pull new images ─────────────────────────────────────────
            # Pull before slot detection — fail fast if image doesn't exist.
            # This is the first validation that the CI artifact is reachable.
            echo "[1/7] Pulling images: $IMAGE_TAG"
            docker pull "${IMAGE_API}:${IMAGE_TAG}"
            docker pull "${IMAGE_WEB}:${IMAGE_TAG}"

            # ── [3] Detect active/idle slot from nginx config ────────────────
            # WHY app.conf, not docker ps: after a successful deploy the old slot
            # stays running as a rollback-ready standby (step [10]). This means
            # docker ps always shows BOTH slots after the first full cycle.
            # Using docker ps as the source of truth incorrectly identifies the
            # standby slot as ACTIVE, causing the deploy to tear down the live
            # traffic slot mid-request (instant 502s). app.conf is the ground
            # truth — nginx reloads it atomically, so it always reflects which
            # slot is actually receiving traffic. The rollback job uses the same
            # approach for the same reason.
            echo "[2/7] Detecting active slot from nginx config"
            ACTIVE=""
            if [ -f "$DEPLOY_PATH/nginx/conf.d/app.conf" ]; then
              ACTIVE=$(grep -oP 'server crm_api_\K(blue|green)' \
                "$DEPLOY_PATH/nginx/conf.d/app.conf" | head -1 || true)
            fi
            # First deploy: app.conf not yet rendered → default active=blue so
            # the first deployment always goes to green (idle slot).
            if [ -z "${ACTIVE:-}" ]; then
              ACTIVE="blue"
              echo "  app.conf not found — first deploy, defaulting ACTIVE=blue"
            fi
            if [ "$ACTIVE" = "blue" ]; then IDLE="green"; else IDLE="blue"; fi
            echo "  Config-detected: ACTIVE=$ACTIVE  IDLE=$IDLE"

            # ── [4] Verify secrets file ──────────────────────────────────────
            if [ ! -f "$DEPLOY_PATH/.secrets" ]; then
              echo "ERROR: $DEPLOY_PATH/.secrets not found — provision it first" && exit 1
            fi

            # ── [5] Verify critical infrastructure is running ────────────────
            # Fail early rather than starting a slot that cannot connect to its deps.
            echo "[3/7] Verifying critical infrastructure"

            _check_container() {
              local name="$1"
              if ! docker ps --format '{{.Names}}' | grep -q "^${name}$"; then
                echo "  ERROR: required container '${name}' is not running" && exit 1
              fi
              echo "  OK: ${name}"
            }

            _check_container crm_postgres
            _check_container crm_redis
            _check_container crm_nginx

            # Verify shared networks exist
            if ! docker network inspect crm_internal >/dev/null 2>&1; then
              echo "  ERROR: network crm_internal not found — run infra bootstrap first" && exit 1
            fi
            if ! docker network inspect crm_public >/dev/null 2>&1; then
              echo "  ERROR: network crm_public not found — run infra bootstrap first" && exit 1
            fi
            echo "  OK: networks crm_internal, crm_public"

            # ── [6a] Bootstrap infra only if missing (idempotent) ───────────
            # Networks already confirmed above — only run if postgres/redis were
            # absent (edge case: fresh server, networks exist from prior run).
            # This block is now only a safety net; the checks above will have
            # already exited if critical services are down.

            # ── [6a] Run Prisma migrations against production DB ────────────
            # WHY before starting the new slot: the old slot is still running and
            # serving traffic during this step. Migrations must be backward-
            # compatible (expand-contract) so the old slot doesn't crash mid-deploy.
            # Running the new image's migrate deploy ensures the schema is ready
            # before the new container starts its first query.
            echo "[4/7] Running Prisma migrations"
            docker run --rm \
              --network crm_internal \
              --env-file "$DEPLOY_PATH/.secrets" \
              --entrypoint npx \
              "${IMAGE_API}:${IMAGE_TAG}" \
              prisma migrate deploy
            echo "  OK: migrations applied"

            # ── [6b] Tear down idle slot — GUARANTEE clean state ────────────
            # WHY: a previous failed deploy may have left containers with the
            # same name. Docker refuses to reuse container names. We must force
            # a clean slate. Two layers: compose (removes tracked containers)
            # then raw docker rm (removes any untracked stragglers).
            echo "[5/7] Cleaning up existing $IDLE slot containers"
            docker compose \
              -f "docker-compose.${IDLE}.yml" \
              --project-name "crm-${IDLE}" \
              down --remove-orphans 2>/dev/null || true

            # Belt-and-suspenders: forcibly remove by name regardless of compose ownership
            docker rm -f "crm_api_${IDLE}" "crm_web_${IDLE}" 2>/dev/null || true

            # ── [6c] Start idle slot with new image ──────────────────────────
            echo "[5/7] Starting $IDLE slot with tag $IMAGE_TAG"
            IMAGE_API="${IMAGE_API}" \
            IMAGE_WEB="${IMAGE_WEB}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            SLOT="${IDLE}" \
            docker compose \
              -f "docker-compose.${IDLE}.yml" \
              --project-name "crm-${IDLE}" \
              --env-file "$DEPLOY_PATH/.secrets" \
              up -d --no-build --pull never

            # ── [7] Health-gate new slot — zero-downtime guarantee ───────────
            # Traffic is NOT switched until both API and web pass.
            # If either fails, the old slot keeps serving; deploy is aborted.
            IDLE_CONTAINER="crm_api_${IDLE}"
            echo "[6/7] Health-checking $IDLE API (container: $IDLE_CONTAINER)"
            bash "$DEPLOY_PATH/deploy/health-check.sh" "$IDLE_CONTAINER" 60 5
            echo "  OK: $IDLE API is healthy"

            echo "[6/7] Health-checking $IDLE web (container: crm_web_${IDLE})"
            for i in $(seq 1 30); do
              WEB_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "crm_web_${IDLE}" 2>/dev/null || echo "unknown")
              if [ "$WEB_STATUS" = "healthy" ]; then
                echo "  OK: crm_web_${IDLE} is healthy (attempt $i/30)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "  ❌ crm_web_${IDLE} did not become healthy (status: $WEB_STATUS)"
                docker logs "crm_web_${IDLE}" --tail 30
                exit 1
              fi
              echo "  Web health: $WEB_STATUS (attempt $i/30) — retrying in 5s..."
              sleep 5
            done

            # ── [8] Traffic cutover ──────────────────────────────────────────
            if [ "$CANARY_WEIGHT" -gt 0 ] && [ "$CANARY_WEIGHT" -lt 100 ]; then
              # ── Canary: split traffic ──────────────────────────────────────
              ACTIVE_WEIGHT=$(( 100 - CANARY_WEIGHT ))
              echo "[7/7] Canary mode: ${CANARY_WEIGHT}% → $IDLE, ${ACTIVE_WEIGHT}% → $ACTIVE"
              ACTIVE_SLOT="$ACTIVE" \
              IDLE_SLOT="$IDLE" \
              CANARY_WEIGHT="$CANARY_WEIGHT" \
              ACTIVE_WEIGHT="$ACTIVE_WEIGHT" \
              envsubst '${ACTIVE_SLOT} ${IDLE_SLOT} ${CANARY_WEIGHT} ${ACTIVE_WEIGHT}' \
                < "$DEPLOY_PATH/nginx/conf.d/canary.conf.template" \
                > "$DEPLOY_PATH/nginx/conf.d/app.conf"
              docker exec crm_nginx nginx -t && docker exec crm_nginx nginx -s reload
              echo "  OK: canary traffic shifted"
              echo "  INFO: monitor Grafana, then re-run CD with canary_weight=100 to promote"
              exit 0
            else
              # ── Full cutover (blue-green) ──────────────────────────────────
              echo "[7/7] Full cutover: all traffic → $IDLE"
              ACTIVE_SLOT="$IDLE" \
              envsubst '${ACTIVE_SLOT}' \
                < "$DEPLOY_PATH/nginx/conf.d/single-slot.conf.template" \
                > "$DEPLOY_PATH/nginx/conf.d/app.conf"
              # Test config before reload — never reload a broken config
              docker exec crm_nginx nginx -t
              docker exec crm_nginx nginx -s reload
              echo "  OK: traffic switched to $IDLE"
            fi

            # ── [9] Post-cutover health validation (with auto-rollback) ─────────
            echo "[7/7] Validating production endpoint"
            if ! bash "$DEPLOY_PATH/deploy/health-check-prod.sh" 30 5; then
              echo "  ❌ Post-cutover health check FAILED — auto-rolling back to $ACTIVE"
              ACTIVE_SLOT="$ACTIVE" \
              envsubst '${ACTIVE_SLOT}' \
                < "$DEPLOY_PATH/nginx/conf.d/single-slot.conf.template" \
                > "$DEPLOY_PATH/nginx/conf.d/app.conf"
              docker exec crm_nginx nginx -t && docker exec crm_nginx nginx -s reload
              echo "  ✅ Rolled back — production is serving $ACTIVE again"
              exit 1
            fi
            echo "  OK: production endpoint healthy"

            # ── [10] Keep old slot running (true blue-green) ────────────────
            # WHY: tearing down the old slot breaks rollback — the rollback job
            # requires the previous slot to be alive for an instant nginx flip.
            # The old slot sits idle (zero traffic) until the next deploy, when
            # step [6b] tears it down and replaces it with the new image.
            echo "[7/7] Old $ACTIVE slot kept as idle standby (rollback-ready)"
            echo "  Rollback: re-trigger CD with image_tag=ROLLBACK"

            # Clean up dangling images (keep last 72h)
            docker image prune -f --filter "until=72h" || true

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " DEPLOY COMPLETE — active slot: $IDLE ($IMAGE_TAG)"
            echo " Idle standby slot: $ACTIVE (previous version, ready for rollback)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            git log -1 --oneline

  # ── Rollback job (manual trigger only) ────────────────────────────────────
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == 'ROLLBACK'
    steps:
      - name: Rollback to previous slot
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/crm-with-blockchain-rag}"
            cd "$DEPLOY_PATH"

            # Derive the PRIMARY slot from the live nginx config, not from which
            # containers are running. In canary mode both slots run simultaneously,
            # so "docker ps" cannot distinguish primary from canary — whichever has
            # the higher weight in app.conf IS the stable slot to roll back to.
            # grep the rendered app.conf for the first "server crm_api_<slot>" line;
            # the primary is listed first (highest weight or only entry).
            PRIMARY=$(grep -oP 'server crm_api_\K(blue|green)' \
              "$DEPLOY_PATH/nginx/conf.d/app.conf" | head -1)

            if [ -z "$PRIMARY" ]; then
              echo "ERROR: cannot determine primary slot from app.conf — inspect manually" && exit 1
            fi

            if [ "$PRIMARY" = "blue" ]; then FALLBACK="green"; else FALLBACK="blue"; fi

            # In canary mode PRIMARY is the stable slot; rollback = route all to PRIMARY.
            # In full-switch mode PRIMARY is the new slot; FALLBACK is previous version.
            # Detect canary mode: if both slots appear in app.conf, we're in canary.
            SLOT_COUNT=$(grep -oP 'server crm_api_\K(blue|green)' \
              "$DEPLOY_PATH/nginx/conf.d/app.conf" | sort -u | wc -l)

            if [ "$SLOT_COUNT" -gt 1 ]; then
              # Canary mode — roll back to PRIMARY (the stable high-weight slot)
              TARGET="$PRIMARY"
              echo "Canary rollback detected — routing all traffic back to primary: $TARGET"
            else
              # Full blue-green — FALLBACK is the previous version
              if ! docker ps --format '{{.Names}}' | grep -q "^crm_api_${FALLBACK}$"; then
                echo "ERROR: previous slot crm_api_${FALLBACK} is not running — cannot rollback" && exit 1
              fi
              TARGET="$FALLBACK"
              echo "Full blue-green rollback — routing traffic to previous slot: $TARGET"
            fi

            ACTIVE_SLOT="$TARGET" \
            envsubst '${ACTIVE_SLOT}' \
              < "$DEPLOY_PATH/nginx/conf.d/single-slot.conf.template" \
              > "$DEPLOY_PATH/nginx/conf.d/app.conf"
            docker exec crm_nginx nginx -t
            docker exec crm_nginx nginx -s reload

            echo "ROLLBACK COMPLETE — now serving: $TARGET"
