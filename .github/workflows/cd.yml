name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234). Defaults to latest main.'
        required: false
        default: ''
      canary_weight:
        description: 'Canary traffic weight (0-100). 0 = full blue-green, no canary.'
        required: false
        default: '0'

concurrency:
  group: cd-production
  cancel-in-progress: false   # never cancel a running deploy — finish or rollback

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Blue-Green Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      # ── Resolve image names + tag ─────────────────────────────────────────
      # WHY: github.repository_owner preserves original casing; Docker requires
      # lowercase image names. We lowercase the owner once here and pass the
      # resolved values forward so every step uses the same reference.
      - name: Resolve image tag
        id: resolve
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_api=ghcr.io/${OWNER_LC}/crm-api" >> "$GITHUB_OUTPUT"
          echo "image_web=ghcr.io/${OWNER_LC}/crm-web" >> "$GITHUB_OUTPUT"

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA:0:7}"
          else
            echo "Cannot determine image tag" && exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "canary_weight=${{ github.event.inputs.canary_weight || '0' }}" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      # ── SSH: Blue-Green Deploy ────────────────────────────────────────────
      - name: Deploy to server (blue-green)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          IMAGE_API: ${{ steps.resolve.outputs.image_api }}
          IMAGE_WEB: ${{ steps.resolve.outputs.image_web }}
          CANARY_WEIGHT: ${{ steps.resolve.outputs.canary_weight }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GIT_REPO: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: IMAGE_TAG,IMAGE_API,IMAGE_WEB,CANARY_WEIGHT,GHCR_TOKEN,GHCR_USER,GIT_REPO,DEPLOY_PATH
          # Timeout generous — health checks can take up to 3 min
          command_timeout: 18m
          script: |
            set -euo pipefail

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " CRM Blue-Green Deploy — tag: $IMAGE_TAG"
            echo " Canary weight: $CANARY_WEIGHT%"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            DEPLOY_PATH="${DEPLOY_PATH:-/opt/crm-with-blockchain-rag}"
            cd "$DEPLOY_PATH"

            # ── [0] Pull deploy helpers ──────────────────────────────────────
            # The scripts live in the repo; sync only the infra files.
            # Repo is public — no auth needed for fetch.
            git remote set-url origin "https://github.com/${GIT_REPO}.git"
            git fetch origin main --quiet
            git checkout origin/main -- deploy/ nginx/ observability/ docker-compose.yml docker-compose.blue.yml docker-compose.green.yml

            # ── [1] Authenticate to GHCR ────────────────────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── [2] Pull new images ─────────────────────────────────────────
            # WHY: pull before switching traffic so the new container starts
            # instantly — no download delay during the cutover window.
            echo "[1/7] Pulling images: $IMAGE_TAG"
            docker pull "${IMAGE_API}:${IMAGE_TAG}"
            docker pull "${IMAGE_WEB}:${IMAGE_TAG}"

            # ── [3] Determine active/idle slot ──────────────────────────────
            # We maintain two stacks: blue and green.
            # The ACTIVE slot serves real traffic; IDLE is where we deploy.
            ACTIVE=$(cat "$DEPLOY_PATH"/.active_slot 2>/dev/null || echo "blue")
            if [ "$ACTIVE" = "blue" ]; then
              IDLE="green"
            else
              IDLE="blue"
            fi
            echo "[2/7] Active slot: $ACTIVE → deploying to: $IDLE"

            # ── [4] Load secrets via Docker secrets / env file ──────────────
            # WHY: .env files are readable by anyone with shell access.
            # We store secrets in "$DEPLOY_PATH"/.secrets (mode 600, root-only)
            # and pass them via --env-file only to the containers that need them.
            # For AWS-style setups, replace this block with:
            #   aws secretsmanager get-secret-value ...
            if [ ! -f "$DEPLOY_PATH"/.secrets ]; then
              echo "ERROR: "$DEPLOY_PATH"/.secrets not found — provision it first" && exit 1
            fi

            # ── [5a] Ensure shared infra is up ───────────────────────────────
            # WHY: networks (crm_internal, crm_public) and stateful services
            # (postgres, redis, mongodb, nginx, observability) are defined in
            # docker-compose.yml and must exist before slot containers start.
            # --no-recreate makes this idempotent — running containers are untouched.
            echo "[3/7] Ensuring shared infra is up"
            # WHY docker network check first: if infra was ever started (manually
            # or by a previous deploy), the named networks already exist and the
            # containers are running. Running compose up again risks container_name
            # conflicts even with --no-recreate because compose tracks ownership
            # by project label — containers started outside the current project
            # are invisible to it. Skip infra bootstrap if networks already exist.
            if ! docker network inspect crm_internal >/dev/null 2>&1; then
              docker compose \
                -f docker-compose.yml \
                --env-file "$DEPLOY_PATH"/.secrets \
                up -d --no-recreate --no-build --pull missing
            else
              echo "  ✅ Networks already exist — skipping infra bootstrap"
            fi

            # ── [5b] Tear down idle slot (idempotent cleanup) ────────────────
            # WHY: a previous failed deploy or manual intervention may have left
            # containers in the idle slot. Docker cannot reuse a container name
            # that already exists — this step guarantees a clean slate before
            # bringing up the new version.
            echo "[3/7] Cleaning up any existing $IDLE slot containers"
            docker compose \
              -f "docker-compose.${IDLE}.yml" \
              --project-name "crm-${IDLE}" \
              down --remove-orphans || true

            # Belt-and-suspenders: remove by name in case compose didn't track them
            # (e.g. containers created outside of compose context)
            docker rm -f "crm_api_${IDLE}" "crm_web_${IDLE}" 2>/dev/null || true

            # ── [5c] Start idle slot with new image ──────────────────────────
            # WHY only the slot file: docker-compose.yml defines shared infra
            # (postgres, redis, nginx) already managed by crm-infra. Including
            # it here would cause container name conflicts. The slot files declare
            # crm_internal/crm_public as external, so they join the existing networks.
            echo "[3/7] Starting $IDLE slot with tag $IMAGE_TAG"
            IMAGE_API="${IMAGE_API}" \
            IMAGE_WEB="${IMAGE_WEB}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            SLOT="${IDLE}" \
            docker compose \
              -f "docker-compose.${IDLE}.yml" \
              --project-name "crm-${IDLE}" \
              --env-file "$DEPLOY_PATH"/.secrets \
              up -d --no-build --pull never

            # ── [6] Health-gate new slot ─────────────────────────────────────
            # WHY: we do NOT cut over traffic until we have confirmed the new
            # slot is healthy. This is the core zero-downtime guarantee.
            # Containers use `expose` not `ports` — health check runs via
            # docker exec inside the container, not via a host-bound port.
            IDLE_CONTAINER="crm_api_${IDLE}"

            echo "[4/7] Health-checking $IDLE slot (container: $IDLE_CONTAINER)"
            bash "$DEPLOY_PATH/deploy/health-check.sh" "$IDLE_CONTAINER" 60 5
            echo "  ✅ $IDLE slot is healthy"

            # ── [7] Traffic cutover ──────────────────────────────────────────
            if [ "$CANARY_WEIGHT" -gt 0 ] && [ "$CANARY_WEIGHT" -lt 100 ]; then
              # ── Canary: split traffic ──────────────────────────────────────
              ACTIVE_WEIGHT=$(( 100 - CANARY_WEIGHT ))
              echo "[5/7] Canary mode: ${CANARY_WEIGHT}% → $IDLE, ${ACTIVE_WEIGHT}% → $ACTIVE"
              ACTIVE_SLOT="$ACTIVE" \
              IDLE_SLOT="$IDLE" \
              CANARY_WEIGHT="$CANARY_WEIGHT" \
              ACTIVE_WEIGHT="$ACTIVE_WEIGHT" \
              envsubst '${ACTIVE_SLOT} ${IDLE_SLOT} ${CANARY_WEIGHT} ${ACTIVE_WEIGHT}' \
                < "$DEPLOY_PATH/nginx/conf.d/canary.conf.template" \
                > "$DEPLOY_PATH/nginx/conf.d/app.conf"
              docker exec crm_nginx nginx -s reload
              echo "  ✅ Canary traffic shifted"
              echo "  ℹ️  Monitor Grafana, then re-run CD with canary_weight=100 to promote"
              # Record canary state — do NOT update .active_slot yet
              echo "$IDLE" > "$DEPLOY_PATH"/.canary_slot
              exit 0
            else
              # ── Full cutover (blue-green) ──────────────────────────────────
              echo "[5/7] Full cutover: all traffic → $IDLE"
              ACTIVE_SLOT="$IDLE" \
              envsubst '${ACTIVE_SLOT}' \
                < "$DEPLOY_PATH/nginx/conf.d/single-slot.conf.template" \
                > "$DEPLOY_PATH/nginx/conf.d/app.conf"
              docker exec crm_nginx nginx -s reload
              echo "  ✅ Traffic switched to $IDLE"
            fi

            # ── [8] Post-cutover health validation ───────────────────────────
            echo "[6/7] Validating production endpoint"
            bash "$DEPLOY_PATH/deploy/health-check-prod.sh" 30 5
            echo "  ✅ Production endpoint healthy"

            # ── [9] Tear down old slot ───────────────────────────────────────
            echo "[7/7] Stopping old $ACTIVE slot"
            docker compose \
              -f "docker-compose.${ACTIVE}.yml" \
              --project-name "crm-${ACTIVE}" \
              down --remove-orphans || true

            # Persist new active slot
            echo "$IDLE" > "$DEPLOY_PATH"/.active_slot
            rm -f "$DEPLOY_PATH"/.canary_slot

            # Clean up dangling images (keep last 3 tags)
            docker image prune -f --filter "until=72h" || true

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo " ✅ Deployment complete — active slot: $IDLE ($IMAGE_TAG)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            git log -1 --oneline

  # ── Rollback job (manual trigger only) ────────────────────────────────────
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == 'ROLLBACK'
    steps:
      - name: Rollback to previous slot
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/crm-with-blockchain-rag}"
            cd "$DEPLOY_PATH"

            ACTIVE=$(cat "$DEPLOY_PATH"/.active_slot 2>/dev/null || echo "blue")
            if [ "$ACTIVE" = "blue" ]; then PREV="green"; else PREV="blue"; fi

            echo "Rolling back from $ACTIVE → $PREV"

            # Re-point nginx to the previous slot (it's still running)
            ACTIVE_SLOT="$PREV" \
            envsubst '${ACTIVE_SLOT}' \
              < "$DEPLOY_PATH/nginx/conf.d/single-slot.conf.template" \
              > "$DEPLOY_PATH/nginx/conf.d/app.conf"
            docker exec crm_nginx nginx -s reload

            echo "$PREV" > "$DEPLOY_PATH"/.active_slot
            echo "✅ Rollback complete — now serving: $PREV"
