# ─────────────────────────────────────────────────────────────────────────────
# GREEN slot — app services
# Mirrors blue exactly. Container names differ so both can run simultaneously.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    image: ${IMAGE_API}:${IMAGE_TAG}
    container_name: crm_api_green
    restart: unless-stopped
    env_file:
      - /opt/crm-with-blockchain-rag/.secrets
    environment:
      NODE_ENV: production
      PORT: 3001
      API_VERSION: v1
      SLOT: green
      OTEL_EXPORTER_OTLP_ENDPOINT: http://crm_otel_collector:4318
      OTEL_SERVICE_NAME: crm-api
    networks:
      - crm_internal
      - crm_public
    expose:
      - "3001"
    volumes:
      - api_logs_green:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
    security_opt:
      - no-new-privileges:true
    read_only: false   # NestJS writes logs; set true if logs go to stdout only
    tmpfs:
      - /tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: ${IMAGE_WEB}:${IMAGE_TAG}
    container_name: crm_web_green
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SLOT: green
    networks:
      - crm_internal
      - crm_public
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  api_logs_green:

networks:
  crm_internal:
    external: true
  crm_public:
    external: true
