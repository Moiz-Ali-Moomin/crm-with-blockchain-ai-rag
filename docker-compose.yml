version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 32m

  mongodb:
    image: mongo:7-jammy
    container_name: crm_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u \"$MONGO_USER\" -p \"$MONGO_PASSWORD\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping').ok\" 2>&1 | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - crm_public
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.5'
        reservations:
          memory: 16m

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: crm_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m

  grafana:
    image: grafana/grafana:11.0.0
    container_name: crm_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: https://bestpurchasestore.com/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - crm_internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 32m

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: crm_alertmanager
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s|\$${ALERTMANAGER_SMTP_USER}|$${ALERTMANAGER_SMTP_USER}|g" \
          -e "s|\$${ALERTMANAGER_SMTP_PASSWORD}|$${ALERTMANAGER_SMTP_PASSWORD}|g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml && \
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=https://bestpurchasestore.com/alertmanager \
          --web.route-prefix=/alertmanager
    environment:
      ALERTMANAGER_SMTP_USER: ${ALERTMANAGER_SMTP_USER:-}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD:-}
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - crm_internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9093/alertmanager/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 32m

  tempo:
    image: grafana/tempo:2.5.0
    container_name: crm_tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo:/etc/tempo:ro
      - tempo_data:/var/tempo
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: crm_otel_collector
    restart: unless-stopped
    command: --config=/etc/otelcol/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otelcollector:/etc/otelcol:ro
    networks:
      - crm_internal
    depends_on:
      - tempo
      - loki
      - prometheus
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m

  loki:
    image: grafana/loki:3.0.0
    container_name: crm_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki:/etc/loki:ro
      - loki_data:/loki
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: crm_nginx_exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://crm_nginx:8080/stub_status'
    networks:
      - crm_internal
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.1'
        reservations:
          memory: 16m

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: crm_node_exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - crm_internal
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'
        reservations:
          memory: 32m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: crm_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - crm_internal
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m

  postgres-backup:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups/postgres:/backups
    networks:
      - crm_internal
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 32m

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  certbot_www:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alertmanager_data:

networks:
  crm_internal:
    name: crm_internal
    external: true

  crm_public:
    name: crm_public
    external: true