version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Base docker-compose — infrastructure services shared by both slots.
# App services (api, web) are defined in docker-compose.blue.yml /
# docker-compose.green.yml so the two slots can run simultaneously.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Stateful services (single instance, shared by both slots) ─────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7-jammy
    container_name: crm_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u \"$MONGO_USER\" -p \"$MONGO_PASSWORD\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping').ok\" 2>&1 | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Reverse proxy (single instance, reloaded in-place during deploys) ──────
  # WHY: nginx reload (SIGHUP) is zero-downtime — it drains existing connections
  # while workers on the new config handle new ones. No restart needed.
  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - crm_public
      - crm_internal   # needs to reach both blue and green app containers
    healthcheck:
      # /healthz is served by nginx itself (no upstream dependency).
      # Using the app health endpoint here would report unhealthy during bootstrap
      # before any app slot is running, causing misleading container state.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Observability stack ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: crm_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'          # allows hot-reload via POST /-/reload
      - '--web.enable-remote-write-receiver'  # accepts OTLP metrics from OTEL collector
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - crm_internal
    # Not exposed externally — accessed only via Grafana or SSH tunnel
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.0.0
    container_name: crm_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: https://bestpurchasestore.com/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      # Plugins disabled — crm_internal network has no internet access (internal: true).
      # Grafana crashes trying to reach grafana.com to download them.
      # To add plugins, build a custom Grafana image with RUN grafana-cli plugins install ...
      # GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - crm_internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Alertmanager (routes Prometheus alerts → email / Slack) ──────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: crm_alertmanager
    restart: unless-stopped
    # Using entrypoint array and POSIX sh format avoids YAML fold bugs
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /etc/alertmanager/alertmanager.yml /tmp/alertmanager.yml
        sed -i "s|\$${ALERTMANAGER_SMTP_USER}|${ALERTMANAGER_SMTP_USER}|g" /tmp/alertmanager.yml
        sed -i "s|\$${ALERTMANAGER_SMTP_PASSWORD}|${ALERTMANAGER_SMTP_PASSWORD}|g" /tmp/alertmanager.yml
        sed -i "s|\$${ALERTMANAGER_SLACK_WEBHOOK}|${ALERTMANAGER_SLACK_WEBHOOK}|g" /tmp/alertmanager.yml
        exec alertmanager --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=https://bestpurchasestore.com/alertmanager \
          --web.route-prefix=/alertmanager
    environment:
      ALERTMANAGER_SMTP_USER: ${ALERTMANAGER_SMTP_USER}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD}
      ALERTMANAGER_SLACK_WEBHOOK: ${ALERTMANAGER_SLACK_WEBHOOK:-}
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - crm_internal
    depends_on:
      - prometheus

  # ── Distributed tracing (Tempo + OTEL Collector) ─────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: crm_tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"    # Tempo HTTP API (Grafana datasource + health checks)
    volumes:
      - ./observability/tempo:/etc/tempo:ro
      - tempo_data:/var/tempo
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: crm_otel_collector
    restart: unless-stopped
    command: --config=/etc/otelcol/config.yml
    ports:
      - "4317:4317"   # OTLP gRPC — apps instrument with this
      - "4318:4318"   # OTLP HTTP — browser/SDK HTTP fallback
    volumes:
      - ./observability/otelcollector:/etc/otelcol:ro
    networks:
      - crm_internal
    depends_on:
      - tempo
      - loki
      - prometheus

  # ── Log aggregation (Loki + Promtail) ─────────────────────────────────────
  # WHY: centralized logs mean you can correlate an error spike in Grafana with
  # the exact log line that caused it — without SSH-ing into the container.
  loki:
    image: grafana/loki:3.0.0
    container_name: crm_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki:/etc/loki:ro
      - loki_data:/loki
    networks:
      - crm_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:3.0.0
    container_name: crm_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - crm_internal
    depends_on:
      - loki

  # ── Nginx Prometheus exporter ─────────────────────────────────────────────
  # Scrapes nginx stub_status (port 8080 inside crm_nginx) and exposes
  # Prometheus-format metrics on port 9113 for prometheus.yml to collect.
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: crm_nginx_exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://crm_nginx:8080/stub_status'
    networks:
      - crm_internal
    depends_on:
      - nginx

  # ── Node exporter (host metrics) ──────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: crm_node_exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - crm_internal

  # ── cAdvisor (container metrics) ─────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: crm_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - crm_internal

  # ── Daily Postgres backup ──────────────────────────────────────────────────
  postgres-backup:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups/postgres:/backups
    networks:
      - crm_internal
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
          echo \"[$$TIMESTAMP] Running backup...\";
          pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/crm_$$TIMESTAMP.sql.gz;
          echo \"[$$TIMESTAMP] Backup complete.\";
          ls -t /backups/*.sql.gz | tail -n +8 | xargs rm -f;
          echo \"Sleeping 24h...\";
          sleep 86400;
        done
      "

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  certbot_www:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alertmanager_data:

networks:
  crm_internal:
    name: crm_internal
    internal: true
    # internal: true isolates this network from the internet.
    # Slot containers (blue/green) declare it as external: true and join it.
    # The infra project owns it — slot projects never create or destroy it.
  crm_public:
    name: crm_public
    # internet-facing — nginx and web containers attach here for external traffic.
