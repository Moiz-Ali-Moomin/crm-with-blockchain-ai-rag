version: '3.9'

services:
  # ── Postgres ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped

    env_file:
      - .secrets

    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: crm_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - crm_internal

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crm_user -d crm_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped

    env_file:
      - .secrets

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

    volumes:
      - redis_data:/data

    networks:
      - crm_internal

    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: crm_mongodb
    restart: unless-stopped

    env_file:
      - .secrets

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    volumes:
      - mongo_data:/data/db

    networks:
      - crm_internal

  # ── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

    networks:
      - crm_public
      - crm_internal

    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: crm_prometheus
    restart: unless-stopped

    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus

    networks:
      - crm_internal

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: crm_grafana
    restart: unless-stopped

    env_file:
      - .secrets

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - crm_internal

    depends_on:
      - prometheus

  # ── Alertmanager ─────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: crm_alertmanager
    restart: unless-stopped

    env_file:
      - .secrets

    environment:
      ALERTMANAGER_SMTP_USER: ${ALERTMANAGER_SMTP_USER}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD}
      ALERTMANAGER_SLACK_WEBHOOK: ${ALERTMANAGER_SLACK_WEBHOOK}

    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

    networks:
      - crm_internal

  # ── Postgres Backup ──────────────────────────────────────
  postgres-backup:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres_backup
    restart: unless-stopped

    env_file:
      - .secrets

    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: crm_db
      PGPASSWORD: strongpassword123

    volumes:
      - ./backups/postgres:/backups

    networks:
      - crm_internal

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data:
  certbot_www:


networks:
  crm_internal:
    name: crm_internal
    internal: true

  crm_public:
    name: crm_public
