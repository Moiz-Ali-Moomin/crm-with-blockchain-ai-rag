receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    limit_mib: 256
    spike_limit_mib: 64
    check_interval: 5s

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # 🔥 Traces → Tempo
  otlp/tempo:
    endpoint: crm_tempo:4317
    tls:
      insecure: true

  # 📊 Metrics → Prometheus
  prometheusremotewrite:
    endpoint: http://crm_prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # 📜 Logs → Loki
  loki:
    endpoint: http://crm_loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
      instance: false
      level: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info   # 👈 changed from warn (better visibility)